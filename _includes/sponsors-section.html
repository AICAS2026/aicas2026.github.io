<div class="row t20 b60">
  <div class="small-12 columns">
    <h2 style="text-align: center;">Our Sponsors</h2>

    {% for tier in site.data.sponsors %}
    <p style="text-align: center; font-size: 1.5em; font-weight: bold; color: #000; margin-bottom: 12px; margin-top: 20px;">
      {{ tier.tier }}
    </p>
    <div style="text-align: center; margin-bottom: 10px;">
      {% for sponsor in tier.sponsors %}
      <a href="{{ sponsor.url }}" target="_blank" style="text-decoration: none; border: none; display: inline-block; margin: 0 20px; vertical-align: middle;">
        <img src="{{ sponsor.logo }}" alt="{{ sponsor.name }}" style="width: {{ tier.logo_width }}px; height: auto;"/>
      </a>
      {% endfor %}
    </div>
    {% endfor %}

    <p style="text-align: center; margin-top: 20px;">
      <a href="/sponsors/" class="button small radius">View all sponsors &amp; become a sponsor</a>
    </p>
  </div>
</div>
