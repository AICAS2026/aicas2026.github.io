<div class="row t60 b20">
  <div class="small-12 columns">
    <h2>&#128204; News &amp; Highlights</h2>
    <ul>
      {% for item in site.data.news %}
      <li>
        [{{ item.date }}] {{ item.text }}
        {% if item.link %}
          <a href="{{ item.link }}"{% unless item.link contains 'http' %}{% endunless %}{% if item.link contains 'http' %} target="_blank"{% endif %}>{{ item.link_text }}</a>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
